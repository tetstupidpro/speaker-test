<!DOCTYPE html>
<html>
<head>
  <title>TSP Speaker Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: sans-serif;

    }

    button {
      width: 140px;

    }

    }

      max-width: 400px;

    }

      color: #38bdf8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🔊 TSP Speaker Test</h1>

    <button onclick="playLeft()">LEFT</button>
    <button onclick="playRight()">RIGHT</button><br>

    <button onclick="playStereo()">STEREO</button><br>

    <button onclick="playBass()">BASS</button>
    <button onclick="playTreble()">TREBLE</button>

    <button onclick="playSweep()">SWEEP</button><br>
    <button onclick="playPinkNoise()">PINK NOISE</button>
    <button onclick="playPhase()">PHASE TEST</button>
    
    <div class="footer">
      <p>Powered by TSP Audio</p>
      <p>Sound System & Studio Recording ?</p>
      <a href="https://wa.me/6281234567890?text=Halo%20saya%20mau%20setup%20sound%20system">Call Me</a>
    </div>
  </div>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

async function playPannedAudio(file, panValue) {
  const response = await fetch(file);
  const arrayBuffer = await response.arrayBuffer();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

  const source = audioCtx.createBufferSource();
  const panner = audioCtx.createStereoPanner();

  source.buffer = audioBuffer;
  panner.pan.value = panValue;

  source.connect(panner);
  panner.connect(audioCtx.destination);

  source.start();
}

function playLeft() {
  playPannedAudio('left.mp3', -1); // kiri
}

function playRight() {
  playPannedAudio('right.mp3', 1); // kanan
}

function playTone(freq, pan=0) {
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  let panner = audioCtx.createStereoPanner();

  osc.frequency.value = freq;
  panner.pan.value = pan;

  osc.connect(gain);
  gain.connect(panner);
  panner.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 1000);
}

function playStereo() { playTone(1000, 0); }
function playBass() { playTone(60, 0); }
function playTreble() { playTone(10000, 0); }
  // SWEEP 20Hz - 20kHz
function playSweep() {
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(20, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(20000, audioCtx.currentTime + 5);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 5000);
}

// PINK NOISE
function playPinkNoise() {
  let bufferSize = 4096;
  let node = audioCtx.createScriptProcessor(bufferSize, 1, 1);

  node.onaudioprocess = function(e) {
    let output = e.outputBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      output[i] = Math.random() * 2 - 1;
    }
  };

  node.connect(audioCtx.destination);
  setTimeout(() => node.disconnect(), 3000);
}

// PHASE TEST (L/R kebalik)
function playPhase() {
  let osc = audioCtx.createOscillator();
  let splitter = audioCtx.createChannelSplitter(2);
  let merger = audioCtx.createChannelMerger(2);

  osc.connect(splitter);

  splitter.connect(merger, 0, 0);
  splitter.connect(merger, 0, 1);

  merger.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 2000);
}
</script>
