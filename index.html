<!DOCTYPE html>
<html>
<head>
  <title>TSP Speaker Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 30px;
      font-size: 18px;
      color: #38bdf8;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      height: 55px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: black;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
    }

    button:active {
      transform: scale(0.95);
    }

    .full {
      grid-column: span 2;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
    }

    .cta-btn {
      display: inline-block;
      margin-top: 15px;
      background: #25D366;
      color: white;
      padding: 14px 22px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

  </style>
</head>

<body>
  <div class="container">

    <h1>🔊 TSP Speaker Test</h1>
    <p>Professional Audio Testing Tool</p>

    <!-- BASIC -->
    <h2>🔊 Basic Test</h2>
    <div class="grid">
      <button onclick="playLeft()">LEFT</button>
      <button onclick="playRight()">RIGHT</button>
      <button class="full" onclick="playStereo()">STEREO</button>
      <button onclick="playBass()">BASS</button>
      <button onclick="playTreble()">TREBLE</button>
    </div>

    <!-- PRO -->
    <h2>⚙️ Advanced Test</h2>
    <div class="grid">
      <button class="full" onclick="playSweep()">SWEEP 20Hz - 20kHz</button>
      <button onclick="playPinkNoise()">PINK NOISE</button>
      <button onclick="playPhase()">PHASE TEST</button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <p><b>Need Sound System & Recording Studio Setup?</b></p>
      <p>Call Us</p>

      <a class="cta-btn"
         href="https://wa.me/6287860026049?text=Halo%20TSP%20Audio%20saya%20mau%20konsultasi"
         target="_blank">
         💬 Free Consultation
      </a>
    </div>

  </div>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// LEFT RIGHT PAN
async function playPannedAudio(file, panValue) {
  const response = await fetch(file);
  const arrayBuffer = await response.arrayBuffer();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

  const source = audioCtx.createBufferSource();
  const panner = audioCtx.createStereoPanner();

  source.buffer = audioBuffer;
  panner.pan.value = panValue;

  source.connect(panner);
  panner.connect(audioCtx.destination);

  source.start();
}

function playLeft() { playPannedAudio('left.mp3', -1); }
function playRight() { playPannedAudio('right.mp3', 1); }

// STEREO FILE
async function playStereo() {
  const response = await fetch('stereo.mp3');
  const arrayBuffer = await response.arrayBuffer();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  source.start();
}

// BASIC TONE
function playTone(freq, pan=0) {
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  let panner = audioCtx.createStereoPanner();

  osc.frequency.value = freq;
  panner.pan.value = pan;

  osc.connect(gain);
  gain.connect(panner);
  panner.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 1000);
}

function playBass() { playTone(60); }
function playTreble() { playTone(10000); }

// SWEEP
function playSweep() {
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.frequency.setValueAtTime(20, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(20000, audioCtx.currentTime + 5);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 5000);
}

// PINK NOISE
function playPinkNoise() {
  let bufferSize = 4096;
  let node = audioCtx.createScriptProcessor(bufferSize, 1, 1);

  node.onaudioprocess = function(e) {
    let output = e.outputBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      output[i] = Math.random() * 2 - 1;
    }
  };

  node.connect(audioCtx.destination);
  setTimeout(() => node.disconnect(), 3000);
}

// PHASE
function playPhase() {
  let osc = audioCtx.createOscillator();
  let gainL = audioCtx.createGain();
  let gainR = audioCtx.createGain();
  let merger = audioCtx.createChannelMerger(2);

  gainL.gain.value = 1;
  gainR.gain.value = -1;

  osc.connect(gainL);
  osc.connect(gainR);

  gainL.connect(merger, 0, 0);
  gainR.connect(merger, 0, 1);

  merger.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 2000);
}
</script>

</body>
</html>
