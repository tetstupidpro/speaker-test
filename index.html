<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// AUDIO FILE PAN (LEFT RIGHT)
async function playPannedAudio(file, panValue) {
  const response = await fetch(file);
  const arrayBuffer = await response.arrayBuffer();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

  const source = audioCtx.createBufferSource();
  const panner = audioCtx.createStereoPanner();

  source.buffer = audioBuffer;
  panner.pan.value = panValue;

  source.connect(panner);
  panner.connect(audioCtx.destination);

  source.start();
}

function playLeft() {
  playPannedAudio('left.mp3', -1);
}

function playRight() {
  playPannedAudio('right.mp3', 1);
}

// BASIC TONE
function playTone(freq, pan=0) {
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  let panner = audioCtx.createStereoPanner();

  osc.frequency.value = freq;
  panner.pan.value = pan;

  osc.connect(gain);
  gain.connect(panner);
  panner.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 1000);
}

function playStereo() {
  let audio = new Audio('stereo.mp3');
  audio.play();
}
function playBass() { playTone(60, 0); }
function playTreble() { playTone(10000, 0); }

// SWEEP
function playSweep() {
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(20, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(20000, audioCtx.currentTime + 5);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 5000);
}

// PINK NOISE
function playPinkNoise() {
  let bufferSize = 4096;
  let node = audioCtx.createScriptProcessor(bufferSize, 1, 1);

  node.onaudioprocess = function(e) {
    let output = e.outputBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      output[i] = Math.random() * 2 - 1;
    }
  };

  node.connect(audioCtx.destination);
  setTimeout(() => node.disconnect(), 3000);
}

// PHASE
function playPhase() {
  let osc = audioCtx.createOscillator();
  let gainL = audioCtx.createGain();
  let gainR = audioCtx.createGain();
  let merger = audioCtx.createChannelMerger(2);

  gainL.gain.value = 1;
  gainR.gain.value = -1;

  osc.connect(gainL);
  osc.connect(gainR);

  gainL.connect(merger, 0, 0);
  gainR.connect(merger, 0, 1);

  merger.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 2000);
}
</script>
