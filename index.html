<!DOCTYPE html>
<html>
<head>
  <title>TSP Speaker Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      width: 140px;
      height: 50px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: black;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .container {
      max-width: 400px;
      margin: auto;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
    }

    a {
      color: #38bdf8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🔊 TSP Speaker Test</h1>

    <button onclick="playLeft()">LEFT</button>
    <button onclick="playRight()">RIGHT</button><br>

    <button onclick="playStereo()">STEREO</button><br>

    <button onclick="playBass()">BASS</button>
    <button onclick="playTreble()">TREBLE</button>

    <div class="footer">
      <p>Powered by TSP Audio</p>
      <p>Butuh setup sound system?</p>
      <a href="https://wa.me/628xxxxxxxxxx">Hubungi Kami</a>
    </div>
  </div>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

async function playPannedAudio(file, panValue) {
  const response = await fetch(file);
  const arrayBuffer = await response.arrayBuffer();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

  const source = audioCtx.createBufferSource();
  const panner = audioCtx.createStereoPanner();

  source.buffer = audioBuffer;
  panner.pan.value = panValue;

  source.connect(panner);
  panner.connect(audioCtx.destination);

  source.start();
}

function playLeft() {
  playPannedAudio('left.mp3', -1); // kiri
}

function playRight() {
  playPannedAudio('right.mp3', 1); // kanan
}

function playTone(freq, pan=0) {
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  let panner = audioCtx.createStereoPanner();

  osc.frequency.value = freq;
  panner.pan.value = pan;

  osc.connect(gain);
  gain.connect(panner);
  panner.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 1000);
}

function playStereo() { playTone(1000, 0); }
function playBass() { playTone(60, 0); }
function playTreble() { playTone(10000, 0); }
</script>

</body>
</html>
